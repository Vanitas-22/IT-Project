<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyra - Checkout</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/3e2a7b5865.js" crossorigin="anonymous"></script>
    <style>
        
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="nav-top">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Store Logo">
                    <span class="logo-text">Xyra</span>
                </a>
                <div class="nav-actions">
                    <a href="login.html" class="btn-outline">Login</a>
                    <a href="cart.html" class="btn-outline">
                        <span id="cart-count"><i class="fa-solid fa-cart-shopping" id="cart-icon"></i>0</span>
                    </a>
                </div>
            </div>
            <ul class="nav-menu">
                <li class="nav-item"><a href="shop.html" class="nav-link">Shop</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact Us</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link">Profile</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="checkout-container">
            <h2>Checkout</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name">
                </div>
                
                <div class="form-group">
                    <label for="phonenumber">Phone Number</label>
                    <input type="text" id="phonenumber" placeholder="Enter your phone number">
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" id="address" placeholder="Street name / Building number">
                </div>

                <div class="form-group">
                    <label for="city">City / Zip Code</label>
                    <input type="text" id="city" placeholder="City or zip code">
                </div>

                <div class="form-group">
                    <label for="paymentmethod">Payment Method</label>
                    <select id="paymentmethod">
                        <option value="creditcard">Credit Card</option>
                        <option value="cod">Cash on Delivery</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit" onclick="placeorder(event)">Complete Order</button>
                
                <div id="msg"></div>
            </form>
            <a href="cart.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to cart</a>
        </section>
    </main>

    <footer>
        <div class="footer-top">
            <div class="footer-brand">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Xyra Logo">
                    <span class="logo-text">Xyra</span>
                </a>
                <p class="footer-tagline">Your one stop shop for everything.</p>
            </div>
            <div class="footer-col">
                <h4 class="footer-heading">Quick Links</h4>
                <ul class="footer-links">
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>
            <div class="footer-col">
                <h4 class="footer-heading">Contact</h4>
                <ul class="footer-links">
                    <li><i class="fa-solid fa-envelope"></i> xyra@email.com</li>
                    <li><i class="fa-solid fa-phone"></i> +1 234 567 890</li>
                    <li><i class="fa-solid fa-location-dot"></i> Cairo, Egypt</li>
                </ul>
            </div>
            <div class="footer-col">
                <h4 class="footer-heading">Follow Us</h4>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Xyra. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function placeorder(event) {
            event.preventDefault();

            var n = document.getElementById("fullname").value.trim();
            var p = document.getElementById("phonenumber").value.trim();
            var a = document.getElementById("address").value.trim();
            var c = document.getElementById("city").value.trim();
            var msgdiv = document.getElementById("msg");

            if (n === "" || p === "" || a === "" || c === "") {
                msgdiv.innerHTML = "Error: Please fill in all fields.";
                msgdiv.className = "error";
            } else {
                msgdiv.innerHTML = "Thank you, " + n + "! Your order has been placed successfully.";
                msgdiv.className = "success";
                
                document.getElementById("checkout-form").reset();
            }
        }
    </script>
</body>
</html>
