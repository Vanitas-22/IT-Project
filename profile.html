<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/3e2a7b5865.js" crossorigin="anonymous"></script>
    <script>
    (function() {
        function getCookie(name) {
            const value = `; ${document.cookie}`
            const parts = value.split(`; ${name}=`)

            if(parts.length === 2) {
                return parts.pop().split(';').shift()
            }
            return null
        }

            if(getCookie("theme") === "theme2") {
                document.documentElement.setAttribute("page-theme", "theme2")
            }
        })()
    </script>
</head>
<body>

    <header>
        <nav class="navbar">
            <!--Top navigation-->

            <div class="nav-top">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Store Logo">
                    <span class="logo-text">Xyra</span>
                </a>
        
                <div class="nav-actions">
                    <button class="theme-toggle" onclick="switchTheme()" id="theme-btn">
                        <i class="fa-solid fa-moon" id="theme-icon"></i>
                    </button>
                    <a id="login-btn" href="login.html" class="btn-outline"><i id="login-icon" class=""></i> Login</a>
                    <a href="cart.html" class="btn-outline">
                        <i class="fa-solid fa-cart-shopping" id="cart-icon"></i>
                        <span id="cart-count">0</span>
                    </a>
                </div>
            </div>
            <!--Bottom navigation-->
            
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="shop.html" class="nav-link">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact Us</a>
                    </li>
                    <li class="nav-item">
                        <a href="profile.html" class="nav-link">Profile</a>
                    </li>
                </ul>
            
        </nav>
    </header>


    <main>
        <div class="logsin">
            <div class="container1" style="height: auto; padding: 40px;">
            
                <div class="formBox1 Login" style="position: relative; width: 100%; height: auto; padding: 40px;">
                    <div style="width: 100%;">
                        <h1>My Profile</h1>

                        <div class="inputBox">
                            <input type="text" id="profile-username" placeholder="Username" readonly>
                            <i class="fa-regular fa-user"></i>
                        </div>

                        <div class="inputBox">
                            <input type="email" id="profile-email" placeholder="Email" readonly>
                            <i class="fa-regular fa-envelope"></i>
                        </div>

                        <button class="btn" onclick="logout()">Logout</button>
                    </div>
                </div>

            </div>
        </div>
    </main>



    <footer>
        <!-- Top section -->
        <div class="footer-top">

            <!-- First Column (Brand) -->
            <div class="footer-brand">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Xyra Logo">
                    <span class="logo-text">Xyra</span>
                </a>
                <p class="footer-tagline">Your one stop shop for everything.</p>
            </div>

            <!-- Second Column (Quick Links) -->
            <div class="footer-col">
                <h4 class="footer-heading">Quick Links</h4>
                <ul class="footer-links">
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>

            <!-- Third Column (Contact Info) -->
            <div class="footer-col">
                <h4 class="footer-heading">Contact</h4>
                <ul class="footer-links">
                    <li><i class="fa-solid fa-envelope"></i> xyra@email.com</li>
                    <li><i class="fa-solid fa-phone"></i> +1 234 567 890</li>
                    <li><i class="fa-solid fa-location-dot"></i> Cairo, Egypt</li>
                </ul>
            </div>

            <!-- Fourth Column (Social Media) -->
            <div class="footer-col">
                <h4 class="footer-heading">Follow Us</h4>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>

        </div>

        <!-- Bottom section (copyright bar) -->
        <div class="footer-bottom">
            <p>© 2026 Xyra. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
