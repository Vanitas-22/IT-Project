<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyra</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/3e2a7b5865.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <nav class="navbar">
            <!--Top navigation-->

            <div class="nav-top">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Store Logo">
                    <span class="logo-text">Xyra</span>
                </a>
        
                <div class="nav-actions">
                    <a href="login.html" class="btn-outline">Login</a>
                    <a href="cart.html" class="btn-outline">
                        <span id="cart-count"><i class="fa-solid fa-cart-shopping" id="cart-icon"></i>0</span>
                    </a>
                </div>
            </div>
            <!--Bottom navigation-->
            
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a href="shop.html" class="nav-link">Shop</a>
                    </li>
                    <li class="nav-item">
                        <a href="contact.html" class="nav-link">Contact Us</a>
                    </li>
                    <li class="nav-item">
                        <a href="profile.html" class="nav-link">Profile</a>
                    </li>
                </ul>
            
        </nav>
    </header>


    <main class="shop">
        <section class="shop-banner">
            <h1>🛒 Online Shop</h1>
  
            <div class="controls">
                <button onclick="setTheme('light')">Light Mode</button>
                <button onclick="setTheme('dark')">Dark Mode</button>
            </div>
        </section>

        <section class="products" id="products">

        </section>

        <div class="cart">
            🛒 Cart Items: <span id="cartCount">0</span>
        </div>

        <script src="script.js"></script>
    </main>


    <footer>
        <!-- Top section -->
        <div class="footer-top">

            <!-- First Column (Brand) -->
            <div class="footer-brand">
                <a href="index.html" class="nav-logo">
                    <img src="images/white_logo.png" alt="Xyra Logo">
                    <span class="logo-text">Xyra</span>
                </a>
                <p class="footer-tagline">Your one stop shop for everything.</p>
            </div>

            <!-- Second Column (Quick Links) -->
            <div class="footer-col">
                <h4 class="footer-heading">Quick Links</h4>
                <ul class="footer-links">
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="profile.html">Profile</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>

            <!-- Third Column (Contact Info) -->
            <div class="footer-col">
                <h4 class="footer-heading">Contact</h4>
                <ul class="footer-links">
                    <li><i class="fa-solid fa-envelope"></i> xyra@email.com</li>
                    <li><i class="fa-solid fa-phone"></i> +1 234 567 890</li>
                    <li><i class="fa-solid fa-location-dot"></i> Cairo, Egypt</li>
                </ul>
            </div>

            <!-- Fourth Column (Social Media) -->
            <div class="footer-col">
                <h4 class="footer-heading">Follow Us</h4>
                <div class="footer-socials">
                    <a href="#"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook"></i></a>
                    <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                </div>
            </div>

        </div>

        <!-- Bottom section (copyright bar) -->
        <div class="footer-bottom">
            <p>© 2026 Xyra. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
